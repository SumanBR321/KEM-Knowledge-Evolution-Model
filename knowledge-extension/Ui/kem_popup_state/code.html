        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            backdrop-filter: blur(20px);

<body class="bg-surface-container-lowest font-body flex items-center justify-center min-h-screen p-4">
<!-- Popup Container: 380px fixed width for extension environment -->
<div class="w-[380px] max-h-[500px] bg-surface-container-lowest rounded-xl shadow-ambient overflow-hidden flex flex-col border border-white/5">
<!-- Top Navigation Shell (Shared Components Blueprint) -->
<header class="flex justify-between items-center px-4 h-14 bg-slate-950/60 backdrop-blur-xl border-b border-white/10 font-['Manrope'] tracking-tight">
<div class="text-xl font-bold text-indigo-400 flex items-center gap-2">
<span class="material-symbols-outlined text-indigo-400" style="font-variation-settings: 'FILL' 1;">hub</span>
<span>KEM</span>
</div>
<div class="flex gap-2">
<button class="p-2 hover:bg-white/5 rounded-full transition-colors duration-300 text-slate-400 scale-95 active:duration-150">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
<button class="p-2 hover:bg-white/5 rounded-full transition-colors duration-300 text-slate-400 scale-95 active:duration-150">

</button>
</div>
</header>

<main class="p-6 flex flex-col gap-6">

<div class="flex flex-col gap-3">
<button class="w-full h-12 bg-gradient-to-br from-primary to-primary-container rounded-xl text-on-primary-fixed font-semibold text-sm flex items-center justify-center gap-2 hover:shadow-[0_0_20px_rgba(201,191,255,0.3)] transition-all duration-300 active:scale-[0.98]">

                    Save to Knowledge Memory
                </button>
<div class="flex items-start gap-2 px-1">
<span class="material-symbols-outlined text-secondary text-base mt-0.5">history</span>
<div class="flex flex-col">
<span class="text-xs text-on-surface-variant font-medium leading-tight">The Neurobiology of Focus: A Deep Dive</span>
<span class="text-[10px] text-outline opacity-70">Last saved 4 minutes ago</span>
</div>
</div>
</div>
<!-- Tonal Divider -->
<div class="h-px w-full bg-white opacity-[0.08]"></div>
<!-- Stats Grid (High-end Low Profile) -->
<div class="grid grid-cols-3 gap-2">
<div class="bg-surface-container rounded-lg p-2 flex flex-col items-center justify-center text-center gap-1 border border-white/[0.02]">
<span class="text-secondary font-bold text-sm">1,284</span>
<span class="text-[9px] uppercase tracking-widest text-outline">Pages</span>
</div>
<div class="bg-surface-container rounded-lg p-2 flex flex-col items-center justify-center text-center gap-1 border border-white/[0.02]">
<span class="text-secondary font-bold text-sm">422</span>
<span class="text-[9px] uppercase tracking-widest text-outline">Concepts</span>
</div>
<div class="bg-surface-container rounded-lg p-2 flex flex-col items-center justify-center text-center gap-1 border border-white/[0.02]">
<span class="text-secondary font-bold text-sm">12</span>
<span class="text-[9px] uppercase tracking-widest text-outline">Weeks</span>
</div>
</div>
<!-- Insight Shimmer (Specialized Component) -->
<div class="relative overflow-hidden bg-tertiary-container/30 rounded-lg p-3 group">
<div class="absolute left-0 top-0 bottom-0 w-0.5 bg-tertiary shadow-[0_0_8px_#ffba44]"></div>

<span class="material-symbols-outlined text-tertiary">lightbulb</span>
<p class="text-[11px] leading-relaxed text-on-surface">You've reached your flow state target 3 days early this week.</p>
</div>
</div>
</main>

<footer class="mt-auto border-t border-white/5 p-4 bg-surface-container-low/50">
<a class="group flex items-center justify-center gap-2 text-indigo-400 font-medium text-xs hover:text-primary transition-colors" href="#">
<span>Open Sanctuary Dashboard</span>
<span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1">arrow_forward_ios</span>
</a>
</footer>
</div>
<!-- Visual Texture Element (Background Decor) -->
<div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_right,_#1c1a24_0%,_#0e0d16_100%)]"></div>
<div class="fixed top-1/4 -right-20 w-96 h-96 bg-indigo-900/10 rounded-full blur-[120px] -z-10"></div>
