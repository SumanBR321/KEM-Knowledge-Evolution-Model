<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 16px;
      color: #1e293b;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:active {
      background-color: #1e40af;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #059669;
      font-weight: 500;
      display: none;
      padding: 8px;
      background-color: #d1fae5;
      border-radius: 4px;
      text-align: center;
    }
    #output {
      margin-top: 12px;
      background: #1e293b;
      color: #f8fafc;
      padding: 12px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 250px;
      overflow-y: auto;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Knowledge Memory</h2>
  <button id="save-btn">Save to Knowledge Memory</button>
  <div id="status">Page saved successfully</div>
  <pre id="output"></pre>
  <script src="popup.js"></script>
</body>
</html>
